# Project identification
sonar.projectKey=SME-NovaSondagem-Frontend
sonar.projectName=SME Nova Sondagem Frontend

# Source code
sonar.sources=src
sonar.tests=src

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude files from analysis
sonar.exclusions=\
  **/__mocks__/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/build/**,\
  jest.config.cjs,\
  vite.config.ts,\
  **/*.d.ts

# Exclude files from coverage
sonar.coverage.exclusions=\
  src/main.tsx,\
  src/App.tsx,\
  src/vite-env.d.ts,\
  **/__mocks__/**,\
  **/*.d.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  jest.config.cjs,\
  vite.config.ts

# Coverage report path (adjust based on your setup)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8
